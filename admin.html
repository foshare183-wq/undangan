<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Undangan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 font-sans">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">Pengaturan Undangan</h1>
        <form id="adminForm" class="space-y-4">
            
            <div class="p-4 bg-blue-50 rounded-lg border border-blue-100">
                <h2 class="text-sm font-bold text-blue-800 mb-3">Media (Foto & Musik)</h2>
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700">Nama File Foto Anak</label>
                    <input type="text" id="foto_anak" placeholder="contoh: foto-bayi.jpg" class="mt-1 w-full border border-gray-300 rounded-md p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nama File Musik MP3</label>
                    <input type="text" id="link_musik" placeholder="contoh: sholawat.mp3" class="mt-1 w-full border border-gray-300 rounded-md p-2">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Nama Anak</label>
                <input type="text" id="nama_anak" class="mt-1 w-full border border-gray-300 rounded-md p-2" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Nama Orang Tua</label>
                <input type="text" id="nama_ortu" class="mt-1 w-full border border-gray-300 rounded-md p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Tanggal Acara</label>
                <input type="date" id="tanggal_acara" class="mt-1 w-full border border-gray-300 rounded-md p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Waktu Acara</label>
                <input type="text" id="waktu_acara" placeholder="Contoh: 10:00 WIT - Selesai" class="mt-1 w-full border border-gray-300 rounded-md p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Alamat Lengkap</label>
                <textarea id="alamat" rows="2" class="mt-1 w-full border border-gray-300 rounded-md p-2"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Link Google Maps</label>
                <input type="url" id="link_maps" class="mt-1 w-full border border-gray-300 rounded-md p-2">
            </div>
            
            <button type="submit" id="btnSubmit" class="w-full bg-gray-800 text-white font-bold py-3 px-4 rounded-md hover:bg-black transition">Simpan Pengaturan</button>
            <p id="status" class="text-center text-sm font-semibold mt-2 hidden"></p>
        </form>
    </div>

    <script>
        // ⚠️ GANTI DENGAN URL WEB APP GAS YANG BARU DIDEPLOY ⚠️
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbx0TeL6XCTse6qVHSpAxtnhL1QNdCCyEBkbPchEMdRyTI6QeTYQa0UVCN-pu_vd3iFB9A/exec'; 

        window.onload = function() {
            fetch(GAS_URL).then(r => r.json()).then(res => {
                const data = res.settings; // Ambil objek settings
                document.getElementById('foto_anak').value = data.foto_anak || '';
                document.getElementById('link_musik').value = data.link_musik || '';
                document.getElementById('nama_anak').value = data.nama_anak || '';
                document.getElementById('nama_ortu').value = data.nama_ortu || '';
                document.getElementById('tanggal_acara').value = data.tanggal_acara || '';
                document.getElementById('waktu_acara').value = data.waktu_acara || '';
                document.getElementById('alamat').value = data.alamat || '';
                document.getElementById('link_maps').value = data.link_maps || '';
            });
        };

        document.getElementById('adminForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const status = document.getElementById('status');
            btn.innerText = 'Menyimpan...'; btn.disabled = true;

            const payload = {
                action: 'save_settings', // Penanda untuk GAS
                data: {
                    foto_anak: document.getElementById('foto_anak').value,
                    link_musik: document.getElementById('link_musik').value,
                    nama_anak: document.getElementById('nama_anak').value,
                    nama_ortu: document.getElementById('nama_ortu').value,
                    tanggal_acara: document.getElementById('tanggal_acara').value,
                    waktu_acara: document.getElementById('waktu_acara').value,
                    alamat: document.getElementById('alamat').value,
                    link_maps: document.getElementById('link_maps').value
                }
            };

            fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            }).then(r => r.json()).then(data => {
                status.innerText = 'Tersimpan!';
                status.className = 'text-center text-sm font-semibold mt-2 text-green-600 block';
            }).finally(() => {
                btn.innerText = 'Simpan Pengaturan'; btn.disabled = false;
                setTimeout(() => status.classList.add('hidden'), 3000);
            });
        });
    </script>
</body>
</html>
